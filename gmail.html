<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Correo</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(to right, #dbeafe, #bfdbfe);
    overflow-x:hidden;
}


.navbar{
    background-color: #222;
    position: fixed;
    width: 100%;
    top: 0;
    height: 50px;
    z-index: 1000;
    display:flex;
    align-items:center;
}

.navbar a{
    color: white;
    padding: 14px 15px;
    text-decoration: none;
}

.navbar a:hover{
    background-color: #575757;
}


.hamburger{
    display: none;
    color: white;
    font-size: 25px;
    padding: 10px 20px;
    cursor: pointer;
    margin-left:auto;
}


.menu-lateral{
    position: fixed;
    top: 0;
    right: -240px;
    width: 240px;
    height: 100%;
    background:#333;
    padding-top: 60px;
    transition: 0.3s;
}

.menu-lateral a{
    display: block;
    color: white;
    padding: 15px;
    text-decoration: none;
    border-bottom: 1px solid #444;
}

.menu-lateral a:hover{
    background:#575757;
}


@media (max-width:768px){

    .navbar a{
        display: none;
    }

    .hamburger{
        display: block;
    }


    .card{
        width: 90%;
        padding: 20px;
    }
}


#toggle:checked ~ .menu-lateral{
    right: 0;
}


.contenido{
    margin-top: 70px;
    display: flex;
    justify-content: center;
    padding: 10px;
}

/* TARJETA */
.card{
    background: white;
    width: 60%;
    max-width: 700px;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    text-align: center;
}


h1{
    color: #1e3a8a;
}


.form-group{
    margin: 15px 0;
    text-align: left;
}

label{
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input, textarea{
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #999;
}

input:focus, textarea:focus{
    border-color: #1e3a8a;
    outline: none;
}

textarea{
    height: 100px;
}


button{
    margin-top: 15px;
    padding: 12px 25px;
    background: linear-gradient(45deg, #1e3a8a, #2563eb);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover{
    transform: scale(1.05);
}

.boton{
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    background: #555;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
}
</style>
</head>

<body>

<input type="checkbox" id="toggle" hidden>

<div class="navbar">
    <a href="index.html">Inicio</a>
    <a href="datos.html">Datos Personales</a>
    <a href="estudios.html">Estudios</a>
    <a href="trabajo.html">Trabajo</a>
    <a href="hobbies.html">Hobbies</a>
    <a href="referencias.html">Referencias</a>
    <a href="gmail.html">Correo</a>

    <label for="toggle" class="hamburger">☰</label>
</div>

<div class="menu-lateral">
    <a href="index.html">Inicio</a>
    <a href="datos.html">Datos Personales</a>
    <a href="estudios.html">Estudios</a>
    <a href="trabajo.html">Trabajo</a>
    <a href="hobbies.html">Hobbies</a>
    <a href="referencias.html">Referencias</a>
    <a href="gmail.html">Correo</a>
</div>

<div class="contenido">
    <div class="card">

        <h1>Contacto por Correo</h1>

        <form action="https://formspree.io/f/mnjloone" method="POST">
            <input type="hidden" name="_subject" value="Nuevo mensaje desde tu CV">
            <input type="hidden" name="_captcha" value="false">

            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Correo:</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Mensaje:</label>
                <textarea name="message" required></textarea>
            </div>

            <button type="submit">Enviar Mensaje</button>
        </form>

        <a href="index.html" class="boton">Volver al Inicio</a>

    </div>
</div>

</body>
</html>
