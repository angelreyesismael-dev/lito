<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Correo</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(to right, #dbeafe, #bfdbfe);
}

/* NAVBAR */
.navbar{
    background-color: #222;
    overflow: hidden;
    position: fixed;
    width: 100%;
    top: 0;
}

.navbar a{
    float: left;
    color: white;
    padding: 14px 20px;
    text-decoration: none;
}

.navbar a:hover{
    background-color: #575757;
}

/* CONTENIDO */
.contenido{
    margin-top: 80px;
    display: flex;
    justify-content: center;
}

/* TARJETA */
.card{
    background: white;
    width: 60%;
    max-width: 700px;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
    text-align: center;
}

/* TITULO */
h1{
    color: #1e3a8a;
}

/* FORMULARIO */
.form-group{
    margin: 15px 0;
    text-align: left;
}

label{
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

input, textarea{
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #999;
}

input:focus, textarea:focus{
    border-color: #1e3a8a;
    outline: none;
}

textarea{
    height: 100px;
}

/* BOTON */
button{
    margin-top: 15px;
    padding: 12px 25px;
    background: linear-gradient(45deg, #1e3a8a, #2563eb);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover{
    transform: scale(1.05);
}

.boton{
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    background: #555;
    color: white;
    padding: 10px 20px;
    border-radius: 8px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html">Inicio</a>
    <a href="datos.html">Datos Personales</a>
    <a href="estudios.html">Estudios</a>
    <a href="trabajo.html">Trabajo</a>
    <a href="hobbies.html">Hobbies</a>
    <a href="referencias.html">Referencias</a>
    <a href="gmail.html">Correo</a>
</div>

<!-- CONTENIDO -->
<div class="contenido">
    <div class="card">

        <h1>Contacto por Correo</h1>

        <!-- FORMULARIO -->
        <form action="https://formspree.io/f/mnjloone" method="POST">

            <input type="hidden" name="_subject" value="Nuevo mensaje desde tu CV">
            <input type="hidden" name="_captcha" value="false">

            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Correo:</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Mensaje:</label>
                <textarea name="message" required></textarea>
            </div>

            <button type="submit">Enviar Mensaje</button>
        </form>

        <a href="index.html" class="boton">Volver al Inicio</a>

    </div>
</div>

</body>
</html>
