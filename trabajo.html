<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Experiencia Laboral</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background-image:url("img/fondo.jfif");
}

/* NAVBAR */
.navbar{
    background:#333;
    position:fixed;
    width:100%;
    top:0;
    height:50px;
    z-index:1000;
}

.navbar a{
    float:left;
    color:white;
    padding:14px 20px;
    text-decoration:none;
}

.navbar a:hover{
    background:#575757;
}

/* botón hamburguesa */
.hamburger{
    display:none;
    color:white;
    font-size:25px;
    padding:10px 20px;
    cursor:pointer;
    float:right;
}

/* menú lateral */
.menu-lateral{
    position:fixed;
    top:0;
    right:-220px;
    width:220px;
    height:100%;
    background:#333;
    padding-top:60px;
    transition:0.3s;
}

.menu-lateral a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
    border-bottom:1px solid #444;
}

.menu-lateral a:hover{
    background:#575757;
}

/* 📱 CELULAR */
@media (max-width:768px){

    .navbar a{
        display:none;
    }

    .hamburger{
        display:block;
    }
}

/* activar menú */
#toggle:checked ~ .menu-lateral{
    right:0;
}

/* contenido */
.contenido{
    padding:20px;
    margin-top:60px;
    max-width:800px;
    margin:auto;
}
</style>
</head>

<body>

<!-- checkbox -->
<input type="checkbox" id="toggle" hidden>

<div class="navbar">

<a href="datos.html">Datos Personales</a>

<a href="referencias.html">Referencias</a>
<a href="gmail.html">Correo</a>

<!-- botón -->
<label for="toggle" class="hamburger">☰</label>
</div>

<!-- menú lateral -->
<div class="menu-lateral">
<a href="index.html">Inicio</a>
<a href="datos.html">Datos Personales</a>
<a href="estudios.html">Estudios</a>
<a href="trabajo.html">Trabajo</a>
<a href="hobbies.html">Hobbies</a>
<a href="referencias.html">Referencias</a>
<a href="gmail.html">Correo</a>
</div>

<div class="contenido">
<h1>Experiencia Laboral</h1>

<p>

</p>

</div>

</body>
</html>
