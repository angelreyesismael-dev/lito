<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datos Personales</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background-image:url("img/fondo.jfif");
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    background:#333;
    position:fixed;
    width:100%;
    top:0;
    height:50px;
    z-index:1000;
    display:flex;
    align-items:center;
}

.navbar a{
    color:white;
    padding:14px 15px;
    text-decoration:none;
}

.navbar a:hover{
    background:#575757;
}

/* botón hamburguesa */
.hamburger{
    display:none;
    color:white;
    font-size:25px;
    padding:10px 20px;
    cursor:pointer;
    margin-left:auto;
    user-select:none;
}

/* menú lateral */
.menu-lateral{
    position:fixed;
    top:0;
    right:-240px;
    width:240px;
    height:100%;
    background:#333;
    padding-top:60px;
    transition:0.3s ease;
}

.menu-lateral a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
    border-bottom:1px solid #444;
}

.menu-lateral a:hover{
    background:#575757;
}

/* 📱 CELULAR */
@media (max-width:768px){

    .navbar a{
        display:none;
    }

    .hamburger{
        display:block;
    }
}

/* activar menú */
#toggle:checked ~ .menu-lateral{
    right:0;
}

/* contenido */
.contenido{
    padding:20px;
    margin-top:60px;
    max-width:800px;
    margin:auto;
    text-align:center;
}

/* IMAGEN RESPONSIVE */
img{
    width:100%;
    max-width:250px;
    border-radius:10px;
}
</style>
</head>

<body>

<input type="checkbox" id="toggle" hidden>
